<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어드벤처 레이아웃 시안 — 던전 TRPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-primary:#090b10; --bg-card:rgba(18,22,31,0.78); --bg-panel-soft:rgba(255,255,255,0.04);
    --text-primary:#f3ead8; --text-secondary:#c8bca5; --text-muted:#8f8470;
    --accent-gold:#d7ac61; --accent-red:#d26557; --accent-green:#67bf81;
    --accent-blue:#79a4da; --accent-ember:#d88a57;
    --border-color:rgba(203,173,118,0.16);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Noto Sans KR","Segoe UI",sans-serif;}

  /* ---- frame shell (one artboard = one full game screen) ---- */
  .frame{position:relative;width:1240px;height:740px;padding:18px;overflow:hidden;color:var(--text-primary);
    background:
      radial-gradient(circle at top,rgba(215,172,97,0.12),transparent 34%),
      radial-gradient(circle at bottom right,rgba(53,94,166,0.12),transparent 28%),
      linear-gradient(180deg,#0b0f17 0%,#090b10 55%,#06080d 100%);
    display:flex;flex-direction:column;gap:14px;letter-spacing:-0.01em;}
  .panel{border:1px solid var(--border-color);border-radius:1.4rem;
    background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01)),var(--bg-card);
    box-shadow:0 24px 60px rgba(0,0,0,0.4);}
  .kick{font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--text-muted);margin:0;}
  .ttl{margin:.2rem 0 0;font-weight:600;color:var(--text-primary);}

  /* ---- TOP PARTY HUD BAR (shared, ~1 row) ---- */
  .hud{display:flex;align-items:stretch;gap:14px;padding:12px 16px;}
  .hud-meta{flex:none;display:flex;flex-direction:column;justify-content:center;gap:.3rem;padding-right:14px;
    border-right:1px solid rgba(255,255,255,0.08);min-width:118px;}
  .hud-meta .name{font-family:Georgia,serif;color:var(--accent-gold);font-size:1.02rem;font-weight:600;line-height:1.1;}
  .hud-meta .row{display:flex;gap:.4rem;flex-wrap:wrap;}
  .hud-meta .tag{font-size:.62rem;color:var(--text-secondary);background:rgba(0,0,0,0.2);
    border:1px solid rgba(255,255,255,0.06);border-radius:999px;padding:.14rem .45rem;}
  .hud-chips{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;min-width:0;}
  .chip{display:flex;align-items:center;gap:.65rem;border:1px solid rgba(255,255,255,0.07);
    background:rgba(0,0,0,0.14);border-radius:1rem;padding:.6rem .7rem;min-width:0;}
  .chip .av{flex:none;width:2.2rem;height:2.2rem;border-radius:.7rem;display:flex;align-items:center;justify-content:center;
    font-size:1.1rem;background:rgba(0,0,0,0.28);border:1px solid rgba(255,255,255,0.08);}
  .chip .body{flex:1;min-width:0;display:flex;flex-direction:column;gap:.25rem;}
  .chip .top{display:flex;align-items:baseline;justify-content:space-between;gap:.4rem;}
  .chip .nm{font-size:.86rem;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chip .role{font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;flex:none;}
  .chip .hp{display:flex;align-items:center;gap:.4rem;}
  .chip .hp .bar{flex:1;display:block;height:.4rem;border-radius:999px;background:rgba(255,255,255,0.08);overflow:hidden;}
  .chip .hp .fill{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#5cbf7d,#9fe59a);}
  .chip .hp .v{font-size:.58rem;color:var(--text-secondary);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .chip .meta{display:flex;align-items:center;justify-content:space-between;gap:.5rem;}
  .chip .stats{font-size:.6rem;color:var(--text-muted);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .chip .stats b{color:var(--text-secondary);font-weight:600;}
  .chip .skills{font-size:.56rem;color:var(--accent-gold);opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:7rem;}
  .stars{font-size:.7rem;color:var(--accent-gold);letter-spacing:.1em;}

  /* ---- content row (narration ↔ choices side by side) ---- */
  .stage{flex:1;min-height:0;display:flex;gap:14px;}
  .col-narr{flex:1;min-width:0;display:flex;flex-direction:column;}
  .narr-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 0;}
  .narr-scroll{position:relative;flex:1;min-height:0;overflow:hidden;padding:14px 18px 18px;}
  .narr-scroll::after{content:"";position:absolute;left:0;right:0;bottom:0;height:42px;
    background:linear-gradient(180deg,transparent,rgba(9,12,18,0.85));pointer-events:none;border-radius:0 0 1.4rem 1.4rem;}
  .fade-note{position:absolute;right:18px;bottom:10px;font-size:.6rem;color:var(--text-muted);z-index:2;}

  /* combat banner (shared) */
  .boss{border:1px solid rgba(196,75,75,0.4);border-radius:1rem;
    background:linear-gradient(180deg,rgba(120,20,20,0.28),rgba(35,8,8,0.78));padding:.7rem .85rem;margin-bottom:12px;}
  .boss .r{display:flex;align-items:center;justify-content:space-between;gap:.6rem;}
  .boss .nm{font-weight:700;color:var(--accent-red);font-size:.82rem;display:flex;align-items:center;gap:.4rem;}
  .boss .hpv{font-size:.72rem;color:var(--text-secondary);font-variant-numeric:tabular-nums;}
  .boss .bar{margin-top:.45rem;display:block;height:.4rem;border-radius:999px;background:rgba(255,255,255,0.08);overflow:hidden;}
  .boss .fill{display:block;height:100%;background:linear-gradient(90deg,#c25648,#ef7d6c);border-radius:999px;}
  .boss .eff{margin-top:.45rem;display:inline-block;font-size:.64rem;color:var(--accent-gold);background:rgba(0,0,0,0.28);border-radius:999px;padding:.2rem .55rem;}

  /* ===== Variation A — screenplay + command menu ===== */
  .scriptline{display:grid;grid-template-columns:88px 1fr;gap:.9rem;margin-bottom:1rem;}
  .scriptline .who{text-align:right;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;
    font-weight:700;padding-top:.15rem;}
  .scriptline .said{font-size:.92rem;line-height:1.75;color:var(--text-primary);}
  .scriptline.gm .who{color:var(--text-muted);}
  .scriptline.gm .said{color:var(--text-secondary);font-style:italic;}
  .dicebox{font-family:"JetBrains Mono",monospace;font-size:.72rem;line-height:1.7;color:var(--text-secondary);
    border:1px solid rgba(215,172,97,0.18);border-radius:.8rem;background:rgba(215,172,97,0.05);padding:.6rem .75rem;margin:0 0 1rem 0;}
  .dicebox .hdr{color:var(--accent-gold);font-weight:600;letter-spacing:.12em;}
  .cmd{flex:none;width:330px;display:flex;flex-direction:column;}
  .cmd .ch{display:flex;align-items:center;gap:.7rem;padding:.7rem .8rem;border-radius:.8rem;cursor:default;
    border:1px solid transparent;}
  .cmd .ch .sel{width:1rem;color:var(--accent-gold);font-weight:700;opacity:0;}
  .cmd .ch.on{background:rgba(215,172,97,0.1);border-color:rgba(215,172,97,0.3);}
  .cmd .ch.on .sel{opacity:1;}
  .cmd .ch .key{flex:none;font-family:"JetBrains Mono",monospace;font-size:.66rem;color:var(--text-muted);
    border:1px solid rgba(255,255,255,0.1);border-radius:.35rem;padding:.05rem .3rem;}
  .cmd .ch .lbl{flex:1;font-size:.86rem;font-weight:600;color:var(--text-primary);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cmd .foot{margin-top:auto;display:flex;gap:.5rem;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);}
  .mini-btn{flex:1;text-align:center;font-size:.72rem;font-weight:600;color:var(--text-secondary);
    border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.18);border-radius:.7rem;padding:.5rem;}
  .mini-btn.gold{color:#1a1207;background:linear-gradient(135deg,var(--accent-gold),#f6d28d);border-color:transparent;}

  /* ===== Variation B — dialogue bubbles + choice cards ===== */
  .bub{max-width:84%;border-radius:1.1rem;padding:.7rem .9rem;margin-bottom:.85rem;font-size:.9rem;line-height:1.7;}
  .bub .sp{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-bottom:.25rem;}
  .bub.gm{max-width:100%;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);color:var(--text-secondary);}
  .bub.left{background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.07);}
  .bub.argon{margin-left:auto;background:rgba(215,172,97,0.1);border:1px solid rgba(215,172,97,0.22);}
  .cards{flex:none;width:360px;display:flex;flex-direction:column;gap:.7rem;}
  .bigchoice{border:1px solid rgba(215,172,97,0.14);border-radius:1.1rem;padding:.85rem .95rem;
    background:linear-gradient(135deg,rgba(215,172,97,0.07),rgba(121,164,218,0.02)),rgba(255,255,255,0.02);}
  .bigchoice .top{display:flex;align-items:center;gap:.6rem;}
  .bigchoice .ix{width:1.7rem;height:1.7rem;border-radius:999px;display:flex;align-items:center;justify-content:center;
    background:rgba(215,172,97,0.16);color:var(--accent-gold);font-weight:700;font-size:.74rem;flex:none;}
  .bigchoice .lbl{font-size:.9rem;font-weight:600;color:var(--text-primary);}
  .bigchoice .desc{margin:.45rem 0 0;font-size:.74rem;line-height:1.55;color:var(--text-secondary);}

  /* ===== Variation C — cinematic mono log + slim choices ===== */
  .log{font-family:"JetBrains Mono",monospace;font-size:.78rem;line-height:1.85;}
  .log .tag{color:var(--accent-gold);}
  .log .tag.pina{color:var(--accent-ember);}
  .log .tag.mina{color:var(--accent-blue);}
  .log .gmline{color:var(--text-secondary);margin:0 0 .85rem;}
  .log .dl{color:var(--text-primary);margin:0 0 .85rem;}
  .log .roll{color:var(--accent-green);}
  .log .roll.crit{color:#ffd700;}
  .slim{flex:none;width:288px;display:flex;flex-direction:column;}
  .slim .row{display:flex;align-items:center;gap:.6rem;border-bottom:1px solid rgba(255,255,255,0.06);padding:.7rem .3rem;}
  .slim .row:first-of-type{border-top:1px solid rgba(255,255,255,0.06);}
  .slim .row .k{font-family:"JetBrains Mono",monospace;font-size:.68rem;color:var(--accent-gold);
    border:1px solid rgba(215,172,97,0.28);border-radius:.35rem;padding:.05rem .35rem;flex:none;}
  .slim .row .lbl{flex:1;font-size:.84rem;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .slim .row .ar{color:var(--text-muted);}
  .slim .foot{margin-top:auto;display:flex;gap:.5rem;padding-top:12px;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

// shared party HUD bar
function HudBar(){
  const party = [
    {av:"⚔️", nm:"아르곤", role:"전사", roleC:"var(--accent-gold)", hp:100, hpv:"10/10", stats:["4","1","0"], skill:"강타3 · 활로3"},
    {av:"🗡️", nm:"피나", role:"도적", roleC:"var(--accent-ember)", hp:100, hpv:"10/10", stats:["1","4","1"], skill:"암습1 · 길3"},
    {av:"🔮", nm:"미나", role:"마법사", roleC:"var(--accent-blue)", hp:100, hpv:"10/10", stats:["0","1","4+2"], skill:"속박3 · 연금3"},
  ];
  return (
    <div className="panel hud">
      <div className="hud-meta">
        <span className="name">아르곤의 파티</span>
        <div className="row"><span className="tag">2F</span><span className="tag">📍 F6·E</span></div>
        <span className="stars">★ ★★★</span>
      </div>
      <div className="hud-chips">
        {party.map((p,i)=>(
          <div className="chip" key={i}>
            <span className="av">{p.av}</span>
            <div className="body">
              <div className="top">
                <span className="nm">{p.nm}</span>
                <span className="role" style={{color:p.roleC}}>{p.role}</span>
              </div>
              <div className="hp"><span style={{fontSize:".54rem",fontWeight:700,letterSpacing:".1em",color:"var(--accent-red)"}}>HP</span>
                <span className="bar"><span className="fill" style={{width:p.hp+"%"}}/></span>
                <span className="v">{p.hpv}</span>
              </div>
              <div className="meta">
                <span className="stats">💪{p.stats[0]} · 🏃{p.stats[1]} · 💡{p.stats[2]}</span>
                <span className="skills">{p.skill}</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function BossBanner(){
  return (
    <div className="boss">
      <div className="r">
        <span className="nm">💀 보스 · 리치</span>
        <span className="hpv">HP 4 / 25</span>
      </div>
      <div className="bar"><span className="fill" style={{width:"16%"}}/></div>
      <span className="eff">🔗 마력속박 (2턴)</span>
    </div>
  );
}

/* ---------- Variation A ---------- */
function VariantA(){
  return (
    <div className="frame">
      <HudBar/>
      <div className="stage">
        <div className="panel col-narr">
          <div className="narr-head">
            <div><p className="kick">Scene · Script</p><h3 className="ttl" style={{fontSize:"1.05rem"}}>대화 / 나레이션</h3></div>
            <span className="stars" style={{fontSize:".62rem",color:"var(--text-muted)"}}>🔥 하드 · 전투</span>
          </div>
          <div className="narr-scroll">
            <BossBanner/>
            <div className="dicebox">
              <div className="hdr">🎲 1d20(18) + 스탯(6) + 영감(+5) = 29 — 대성공</div>
              미나의 마법으로 리치에게 11 데미지. 리치 HP 4/25.
            </div>
            <div className="scriptline gm"><span className="who">나레이션</span><span className="said">미나의 마력이 푸른 섬광처럼 리치에게 쏟아졌다. 속박에 묶인 리치의 몸에서 검은 연기가 피어올랐다.</span></div>
            <div className="scriptline"><span className="who" style={{color:"var(--accent-ember)"}}>피나</span><span className="said">와아! 대박! 마법사님 최고! 저 녀석 이제 거의 다 죽어간다!</span></div>
            <div className="scriptline"><span className="who" style={{color:"var(--accent-blue)"}}>미나</span><span className="said">속박이 풀리기 전에 끝내야 합니다, 아르곤님. 모든 공격을 집중해야 합니다.</span></div>
            <div className="scriptline gm"><span className="who">나레이션</span><span className="said">차가운 복도의 공기가 팽팽하게 얼어붙는다. 다음 한 수가 승부를 가른다.</span></div>
          </div>
        </div>
        <div className="panel cmd" style={{padding:"16px"}}>
          <p className="kick">Command</p><h3 className="ttl" style={{fontSize:"1.05rem",marginBottom:"10px"}}>행동 선택</h3>
          <div className="ch on"><span className="sel">▸</span><span className="key">1</span><span className="lbl">⚔️ 아르곤 — 강렬한 일격</span></div>
          <div className="ch"><span className="sel">▸</span><span className="key">2</span><span className="lbl">🧭 북쪽으로 이동</span></div>
          <div className="ch"><span className="sel">▸</span><span className="key">3</span><span className="lbl">🔍 주변 탐색</span></div>
          <div className="foot">
            <span className="mini-btn">대화하기</span>
            <span className="mini-btn gold">영감 ★</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Variation B ---------- */
function VariantB(){
  return (
    <div className="frame">
      <HudBar/>
      <div className="stage">
        <div className="panel col-narr">
          <div className="narr-head">
            <div><p className="kick">Dialogue</p><h3 className="ttl" style={{fontSize:"1.05rem"}}>대화 / 나레이션</h3></div>
            <span className="stars" style={{fontSize:".62rem",color:"var(--text-muted)"}}>🔥 하드 · 전투</span>
          </div>
          <div className="narr-scroll">
            <BossBanner/>
            <div className="bub gm"><div className="sp" style={{color:"var(--text-muted)"}}>나레이션</div>미나의 마법이 리치를 강타했다. <b style={{color:"#ffd700"}}>대성공!</b> 리치 HP 4/25, 여전히 마력속박 상태다.</div>
            <div className="bub left"><div className="sp" style={{color:"var(--accent-ember)"}}>피나</div>와아! 대박! 마법사님 최고! 저 녀석 거의 다 죽어간다!</div>
            <div className="bub left"><div className="sp" style={{color:"var(--accent-blue)"}}>미나</div>속박이 풀리기 전에 끝내야 합니다. 모든 공격을 집중하세요.</div>
            <div className="bub argon"><div className="sp" style={{color:"var(--accent-gold)"}}>아르곤</div>좋아 — 마지막 일격이다.</div>
          </div>
        </div>
        <div className="cards">
          <p className="kick" style={{padding:"4px 2px 0"}}>Choice</p>
          <div className="bigchoice">
            <div className="top"><span className="ix">1</span><span className="lbl">⚔️ 강렬한 일격</span></div>
            <p className="desc">속박된 리치에게 전력을 실어 검을 내리꽂는다. 끝낼 수 있다.</p>
          </div>
          <div className="bigchoice">
            <div className="top"><span className="ix">2</span><span className="lbl">🧭 북쪽으로 이동</span></div>
            <p className="desc">리치를 두고 북쪽 복도 너머 미지의 공간을 탐색한다.</p>
          </div>
          <div className="bigchoice">
            <div className="top"><span className="ix">3</span><span className="lbl">🔍 주변 탐색</span></div>
            <p className="desc">복도 전체를 살피며 단서나 숨겨진 아이템을 찾는다.</p>
          </div>
          <div style={{display:"flex",gap:".5rem",marginTop:"auto"}}>
            <span className="mini-btn">대화하기</span>
            <span className="mini-btn gold">영감 ★ 3/3</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Variation C ---------- */
function VariantC(){
  return (
    <div className="frame">
      <HudBar/>
      <div className="stage">
        <div className="panel col-narr">
          <div className="narr-head">
            <div><p className="kick">Session Log</p><h3 className="ttl" style={{fontSize:"1.05rem"}}>대화 / 나레이션</h3></div>
            <span className="stars" style={{fontSize:".62rem",color:"var(--text-muted)"}}>🔥 하드 · 전투</span>
          </div>
          <div className="narr-scroll">
            <BossBanner/>
            <div className="log">
              <p className="gmline"><span className="roll crit">[ROLL 1d20(18)+6+영감5 = 29 · 대성공]</span><br/>미나의 마력이 리치를 강타 — 11 데미지. 리치 4/25.</p>
              <p className="dl"><span className="tag pina">[피나]</span> 와아! 대박! 저 녀석 거의 다 죽어간다!</p>
              <p className="dl"><span className="tag mina">[미나]</span> 속박이 풀리기 전에 끝내야 합니다. 집중하세요.</p>
              <p className="gmline">차가운 복도의 공기가 팽팽하게 얼어붙는다. 다음 한 수가 승부를 가른다.</p>
